<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アナログ時計</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* 時計本体 */
.clock {
  width: 300px;
  height: 300px;
  border: 8px solid #fff;
  border-radius: 50%;
  position: relative;
}

/* 針の共通 */
.hand {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom center;
}

/* 時針 */
.hour {
  width: 6px;
  height: 70px;
  background: #fff;
}

/* 分針 */
.minute {
  width: 4px;
  height: 100px;
  background: #ccc;
}

/* 秒針（青に変更） */
.second {
  width: 2px;
  height: 120px;
  background: #00aaff;
}

/* 中心 */
.center {
  width: 10px;
  height: 10px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* 数字（1〜12） */
.number {
  position: absolute;
  color: #fff;
  font-size: 20px;
  font-family: sans-serif;
  transform: translate(-50%, -50%);
}

/* 各数字の位置 */
.n1  { top: 18%; left: 75%; }
.n2  { top: 30%; left: 88%; }
.n3  { top: 50%; left: 95%; }
.n4  { top: 70%; left: 88%; }
.n5  { top: 82%; left: 75%; }
.n6  { top: 90%; left: 50%; }
.n7  { top: 82%; left: 25%; }
.n8  { top: 70%; left: 12%; }
.n9  { top: 50%; left: 5%;  }
.n10 { top: 30%; left: 12%; }
.n11 { top: 18%; left: 25%; }
.n12 { top: 8%;  left: 50%; }

</style>
</head>

<body>

<div class="clock">

  <!-- 数字 -->
  <div class="number n1">1</div>
  <div class="number n2">2</div>
  <div class="number n3">3</div>
  <div class="number n4">4</div>
  <div class="number n5">5</div>
  <div class="number n6">6</div>
  <div class="number n7">7</div>
  <div class="number n8">8</div>
  <div class="number n9">9</div>
  <div class="number n10">10</div>
  <div class="number n11">11</div>
  <div class="number n12">12</div>

  <!-- 針 -->
  <div class="hand hour" id="hour"></div>
  <div class="hand minute" id="minute"></div>
  <div class="hand second" id="second"></div>

  <div class="center"></div>
</div>

<script>
function updateClock() {
  const now = new Date();

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform =
    `translate(-50%, 0) rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform =
    `translate(-50%, 0) rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform =
    `translate(-50%, 0) rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
