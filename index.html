<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アナログ時計＋デジタル</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* デジタル時計 */
.digital {
  color: #00ffcc;
  font-size: 48px;
  font-family: 'Courier New', monospace;
  margin-bottom: 20px;
  letter-spacing: 3px;
}

/* 時計本体 */
.clock {
  width: 320px;
  height: 320px;
  border: 8px solid #fff;
  border-radius: 50%;
  position: relative;
}

/* 針 */
.hand {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom center;
}

.hour { width: 6px; height: 80px; background: #fff; }
.minute { width: 4px; height: 110px; background: #ccc; }
.second { width: 2px; height: 130px; background: #00aaff; }

/* 中心 */
.center {
  width: 10px;
  height: 10px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
}

/* 数字 */
.number {
  position: absolute;
  color: #fff;
  font-size: 24px;
  font-weight: bold;
  transform: translate(-50%, -50%);
}

/* 目盛り */
.tick {
  position: absolute;
  width: 2px;
  height: 10px;
  background: #666;
  top: 0;
  left: 50%;
  transform-origin: center 160px;
}

.tick.bold {
  height: 18px;
  background: #fff;
}
</style>
</head>

<body>

<div class="digital" id="digital"></div>

<div class="clock" id="clock">

  <!-- 目盛り -->
</div>

<script>
const clock = document.getElementById("clock");

/* 数字配置 */
for (let i = 1; i <= 12; i++) {
  const num = document.createElement("div");
  num.className = "number";
  num.innerText = i;

  const angle = (i * 30) * Math.PI / 180;
  const x = 160 + 130 * Math.sin(angle);
  const y = 160 - 130 * Math.cos(angle);

  num.style.left = x + "px";
  num.style.top = y + "px";

  clock.appendChild(num);
}

/* 目盛り配置 */
for (let i = 0; i < 60; i++) {
  const tick = document.createElement("div");
  tick.className = "tick";

  if (i % 5 === 0) tick.classList.add("bold");

  tick.style.transform = `rotate(${i * 6}deg)`;
  clock.appendChild(tick);
}

/* 針 */
clock.innerHTML += `
  <div class="hand hour" id="hour"></div>
  <div class="hand minute" id="minute"></div>
  <div class="hand second" id="second"></div>
  <div class="center"></div>
`;

function updateClock() {
  const now = new Date();

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform =
    `translate(-50%, 0) rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform =
    `translate(-50%, 0) rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform =
    `translate(-50%, 0) rotate(${hrDeg}deg)`;

  /* デジタル時計 */
  const h = String(hr).padStart(2, '0');
  const m = String(min).padStart(2, '0');
  document.getElementById("digital").textContent = `${h}:${m}`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
