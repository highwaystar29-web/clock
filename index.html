<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アナログ時計</title>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .clock {
    width: 300px;
    height: 300px;
    border: 8px solid #fff;
    border-radius: 50%;
    position: relative;
  }
  .hand {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: bottom;
    transform: translateX(-50%);
  }
  .hour { width: 6px; height: 70px; background: #fff; }
  .minute { width: 4px; height: 100px; background: #ccc; }
  .second { width: 2px; height: 120px; background: red; }
  .center {
    width: 10px; height: 10px; background: #fff;
    border-radius: 50%;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>

<div class="clock">
  <div class="hand hour" id="hour"></div>
  <div class="hand minute" id="minute"></div>
  <div class="hand second" id="second"></div>
  <div class="center"></div>
</div>

<script>
function updateClock() {
  const now = new Date();
  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours();

  const secDeg = sec * 6;
  const minDeg = min * 6 + sec * 0.1;
  const hrDeg = (hr % 12) * 30 + min * 0.5;

  document.getElementById("second").style.transform =
    `translateX(-50%) rotate(${secDeg}deg)`;
  document.getElementById("minute").style.transform =
    `translateX(-50%) rotate(${minDeg}deg)`;
  document.getElementById("hour").style.transform =
    `translateX(-50%) rotate(${hrDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
